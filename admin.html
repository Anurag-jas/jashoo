<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel - Jasho</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0c1324;
  color: #e2e8f0;
  display: flex;
}

/* Sidebar */
.sidebar {
  width: 220px;
  background: #020617;
  height: 100vh;
  padding: 20px;
}

.sidebar h2 {
  color: gold;
}

.sidebar a {
  display: block;
  margin: 15px 0;
  color: #cbd5e1;
  text-decoration: none;
}

/* Main */
.main {
  flex: 1;
  padding: 20px;
}

/* Cards */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
  gap: 20px;
}

.card {
  background: #1e2937;
  padding: 20px;
  border-radius: 12px;
  text-align: center;
}

.card h3 {
  margin: 0;
  color: #facc15;
}

/* Table */
table {
  width: 100%;
  margin-top: 30px;
  border-collapse: collapse;
}

th, td {
  padding: 10px;
  border-bottom: 1px solid #334155;
}

</style>
</head>

<body onload="loadUsers()">

<!-- Sidebar -->
<div class="sidebar">
  <h2>Jasho Admin</h2>
  <a href="#">Dashboard</a>
  <a href="#">Users</a>
  <a href="#">Withdrawals</a>
  <a href="#">Logout</a>
</div>

<!-- Main -->
<div class="main">

<h1>Admin Dashboard</h1>

<!-- Stats -->
<div class="grid">
  <div class="card">
    <h3>👤 Users</h3>
    <p id="totalUsers">0</p>
  </div>

  <div class="card">
    <h3>💰 Total Coins</h3>
    <p id="totalCoins">0</p>
  </div>
</div>

<!-- Users Table -->
<h2>All Users</h2>

<table>
  <tr>
    <th>Name</th>
    <th>Email</th>
    <th>Coins</th>
    <th>Action</th>
  </tr>

  <tbody id="userTable"></tbody>

</table>

</div>

<!-- Firebase Script -->
<script type="module" src="script.js"></script>

</body>
</html>
