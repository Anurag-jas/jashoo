<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password - Jasho</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #020617, #0c1324);
  color: #e2e8f0;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* Box */
.box {
  background: rgba(30, 41, 59, 0.7);
  backdrop-filter: blur(15px);
  padding: 35px;
  border-radius: 16px;
  width: 320px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.6);
  text-align: center;
}

/* Title */
h2 {
  color: #facc15;
  margin-bottom: 10px;
}

p {
  font-size: 14px;
  color: #94a3b8;
}

/* Input */
input {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  border-radius: 8px;
  border: 1px solid #334155;
  background: #0f172a;
  color: white;
}

input:focus {
  outline: none;
  border-color: #6366f1;
}

/* Button */
button {
  width: 100%;
  padding: 12px;
  margin-top: 18px;
  background: linear-gradient(135deg, #7c3aed, #6366f1);
  border: none;
  color: white;
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.03);
}

/* Links */
.links {
  margin-top: 15px;
  font-size: 13px;
}

.links a {
  color: #cbd5e1;
  text-decoration: none;
}

.links a:hover {
  color: white;
}

/* Mobile */
@media(max-width:400px){
  .box {
    width: 90%;
  }
}
</style>
</head>

<body>

<div class="box">

<h2>Forgot Password</h2>
<p>Enter your email to reset your password</p>

<input type="email" id="email" placeholder="Enter Email">
<button onclick="resetPassword()">Send Reset Link</button>
<div class="links">
  <p>Remember password? <a href="login.html">Login</a></p>
</div>

</div>
<script type="module" src="script.js"></script>
</body>
</html>
